<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let size = parseInt(prompt("Enter the size of array:"));
        let arr = [] ;

        for(let i =0 ; i < size ; i++ )
    {
        arr.push(parseInt(prompt("Enter element: " ) ))
    }

    let key = parseInt ( prompt("Enter element to search : ") )

    let frequency = 0 ;
    let firstIndex = -1;

    for ( let i = 0 ; i< arr.length ; i++)
    {
        if ( arr[i] === key )
        {
            frequency++;
            if ( firstIndex === -1 )
            {
                firstIndex = i ;
            }
        }
    }

    if (firstIndex !== -1) {
        console.log("Element found at index: " + firstIndex);
        console.log("Frequency of element: " + frequency);
    } else {
        console.log("Element not found in the array.");
    }
    </script>
</body>
</html>
